services:
  - type: web
    name: sap-o2c-graph-explorer
    runtime: python
    buildCommand: bash build.sh
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: NODE_VERSION
        value: "18.19.0"
